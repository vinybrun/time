# nginx vhost for the Time app — static Flutter web + proxied API.
# First deploy (port 80 only); then:
#   sudo certbot --nginx -d time.sovereinia.org
# Certbot adds the 443 server block and the HTTP->HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name time.sovereinia.org;

    root /srv/apps/time/web;
    index index.html;

    # Cache FULLY disabled for this site: every response is no-store so a deploy
    # can never serve a stale Flutter bundle. Flutter does NOT content-hash its
    # entrypoints (main.dart.js, flutter_bootstrap.js, flutter.js, the service
    # worker, index.html, version.json) — they keep stable names but change every
    # build, so per-extension caching reliably served stale code after a deploy.
    # The app also ships a self-unregistering service worker and is not behind a
    # CDN. `always` so the header is set on error responses too. Server-level with
    # no per-location add_header, so every location inherits it. Revisit (move
    # truly-hashed assets back to immutable caching) once builds are stable.
    add_header Cache-Control "no-store" always;

    # API + health proxied to the uvicorn service (systemd).
    location /api/ {
        proxy_pass http://127.0.0.1:8810;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8810/health;
        proxy_set_header Host $host;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 2m;
}

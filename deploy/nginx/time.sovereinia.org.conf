# nginx vhost for the Time app — static Flutter web + proxied API.
# First deploy (port 80 only); then:
#   sudo certbot --nginx -d time.sovereinia.org
# Certbot adds the 443 server block and the HTTP->HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name time.sovereinia.org;

    root /srv/apps/time/web;
    index index.html;

    # Long-cache the hashed Flutter assets; never cache the entrypoints.
    location ~* \.(js|wasm|png|jpg|jpeg|svg|ttf|otf|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-cache"; }

    # API + health proxied to the uvicorn service (systemd).
    location /api/ {
        proxy_pass http://127.0.0.1:8810;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8810/health;
        proxy_set_header Host $host;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 2m;
}

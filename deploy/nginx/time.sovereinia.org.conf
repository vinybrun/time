# nginx vhost for the Time app — static Flutter web + proxied API.
# First deploy (port 80 only); then:
#   sudo certbot --nginx -d time.sovereinia.org
# Certbot adds the 443 server block and the HTTP->HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name time.sovereinia.org;

    root /srv/apps/time/web;
    index index.html;

    # Flutter does NOT content-hash its entrypoints — main.dart.js,
    # flutter_bootstrap.js, version.json, the service worker and index.html keep
    # stable names but change every build. They MUST never be cached, or a CDN
    # (Cloudflare here) serves a stale bundle after deploy → white screen. Exact
    # `location =` matches take priority over the regex below, so these win.
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-cache"; }
    location = /flutter_bootstrap.js { add_header Cache-Control "no-cache"; }
    location = /main.dart.js { add_header Cache-Control "no-cache"; }
    location = /version.json { add_header Cache-Control "no-cache"; }

    # Everything else (hashed assets, fonts, canvaskit, images) can be cached.
    location ~* \.(js|wasm|png|jpg|jpeg|svg|ttf|otf|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API + health proxied to the uvicorn service (systemd).
    location /api/ {
        proxy_pass http://127.0.0.1:8810;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8810/health;
        proxy_set_header Host $host;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 2m;
}
